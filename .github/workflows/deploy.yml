name: Deploy Lambda Function

on:
  push:
    branches:
      - main  # 或你的主分支名称
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        architecture: [x64]
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # 与 Lambda 运行时匹配
          architecture: ${{ matrix.architecture }}

      # 3. 安装依赖并构建
      - name: Build deployment package
        run: |
          # 确保清理之前的构建产物
          rm -rf convert-heic convert-heic.zip
          
          # 创建临时目录
          mkdir -p convert-heic
          
          # 安装依赖到临时目录
          pip install -r requirements.txt --target=./convert-heic
          
          # 复制主脚本到临时目录
          cp lambda_function.py convert-heic/

      # 4. 上传 ZIP 包作为构建产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: convert-heic
          path: convert-heic

      # 5. 构建完成通知
      - name: Build completed
        run: echo "Build completed successfully! ZIP package is available as artifact."