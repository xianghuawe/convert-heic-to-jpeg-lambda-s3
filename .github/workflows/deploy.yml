name: Deploy Lambda Function

on:
  push:
    branches:
      - main  # 或你的主分支名称
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        architecture: [x64]
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # 与 Lambda 运行时匹配
          architecture: ${{ matrix.architecture }}

      # 3. 安装依赖并构建
      - name: Build deployment package
        run: |
          # 确保清理之前的构建产物
          rm -rf convert-heic convert-heic.zip
          
          # 创建临时目录
          mkdir -p convert-heic
          
          # 安装依赖到临时目录（使用--no-cache-dir减少缓存，使用--no-deps减少依赖）
          pip install -r requirements.txt --target=./convert-heic --no-cache-dir
          
          # 复制主脚本到临时目录
          cp lambda_function.py convert-heic/
          
          # 清理不必要的文件（减少包大小）
          find convert-heic -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
          find convert-heic -type d -name "test*" -exec rm -rf {} + 2>/dev/null || true
          find convert-heic -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find convert-heic -type d -name "*.dist-info" -exec rm -rf {} + 2>/dev/null || true
          find convert-heic -type f -name "*.pyc" -delete 2>/dev/null || true
          find convert-heic -type f -name "*.pyo" -delete 2>/dev/null || true
          find convert-heic -type d -name "*.egg-info" -exec rm -rf {} + 2>/dev/null || true
          find convert-heic -type d -name "docs" -exec rm -rf {} + 2>/dev/null || true
          find convert-heic -type d -name "examples" -exec rm -rf {} + 2>/dev/null || true
          find convert-heic -type f -name "*.md" -delete 2>/dev/null || true
          
          # 显示最终大小
          du -sh convert-heic

      # 4. 上传 ZIP 包作为构建产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: convert-heic
          path: convert-heic

      # 5. 构建完成通知
      - name: Build completed
        run: echo "Build completed successfully! ZIP package is available as artifact."